name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

    - run: python tools/generate.py

    - uses: peaceiris/actions-gh-pages@v4

      with:

        github_token: ${{ secrets.GITHUB_TOKEN }}

        publish_dir: .