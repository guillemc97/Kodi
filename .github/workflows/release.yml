name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

    #- run: python tools/generate.py

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Actualizar addons.xml e index.html [skip ci]"